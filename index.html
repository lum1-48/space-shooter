<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ccff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Space Shooter">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
  }

  #ui {
    display: flex;
    margin-bottom: 10px;
    font-size: 14px;
    letter-spacing: 1px;
    width: 900px;
    justify-content: space-between;
    align-items: center;
  }

  #ui .p1-ui { color: #0cf; text-shadow: 0 0 8px #0cf; }
  #ui .center-ui { color: #aef; text-align: center; }
  #ui span { font-weight: bold; color: #fff; }
  .heart-p1 { color: #0cf; text-shadow: 0 0 6px #0cf; }

  #pauseBtn {
    background: transparent;
    border: 1px solid #0cf6;
    color: #0cf;
    font-size: 18px;
    cursor: pointer;
    padding: 3px 10px;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: 'Courier New', monospace;
    z-index: 200;
    position: relative;
  }
  #pauseBtn:hover { background: #0cf2; border-color: #0cf; }

  canvas {
    border: 1px solid #1a3a5c;
    border-radius: 4px;
    box-shadow: 0 0 40px #0af3, 0 0 80px #0af1;
    display: block;
  }

  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
  }

  #overlay h1 {
    font-size: 48px;
    letter-spacing: 8px;
    color: #0cf;
    text-shadow: 0 0 20px #0cf, 0 0 40px #0af;
    text-align: center;
  }

  #overlay p {
    font-size: 14px;
    color: #aef;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
  }

  #overlay .score-display {
    font-size: 28px;
    color: #ff6b6b;
    text-shadow: 0 0 10px #f44;
  }

  #overlay .btn-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    pointer-events: all;
  }

  #overlay .btn-row {
    display: flex;
    gap: 20px;
    pointer-events: all;
  }

  #overlay button {
    pointer-events: all;
    padding: 12px 36px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    letter-spacing: 3px;
    color: #0cf;
    background: transparent;
    border: 2px solid #0cf;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 10px #0cf5;
    min-width: 280px;
  }

  #overlay button:hover { background: #0cf2; box-shadow: 0 0 20px #0cf9; }

  #overlay button.btn-warn {
    color: #fa0; border-color: #fa0; box-shadow: 0 0 10px #fa05;
  }
  #overlay button.btn-warn:hover { background: #fa02; box-shadow: 0 0 20px #fa09; }

  #overlay button.btn-green {
    color: #4f4; border-color: #4f4; box-shadow: 0 0 10px #4f45;
  }
  #overlay button.btn-green:hover { background: #4f42; box-shadow: 0 0 20px #4f49; }

  #overlay button.btn-sm { min-width: 0; padding: 10px 28px; font-size: 14px; }

  .records-table {
    font-size: 13px;
    letter-spacing: 1px;
    color: #aef;
    width: 320px;
    border-collapse: collapse;
  }
  .records-table td { padding: 4px 10px; }
  .records-table td:first-child { color: #556; }
  .records-table td:nth-child(2) { color: #fff; font-weight: bold; text-align: right; }
  .records-table td:nth-child(3) { color: #aef; text-align: center; }
  .records-table td:nth-child(4) { color: #556; text-align: right; }
  .records-table tr.new-record td { color: #ff0 !important; text-shadow: 0 0 8px #ff0; }

  #recordDisplay { color: #ff0; text-shadow: 0 0 6px #aa0; }

  .changelog-wrap {
    max-height: 380px;
    overflow-y: auto;
    width: 480px;
    scrollbar-width: thin;
    scrollbar-color: #0cf4 #0001;
    padding-right: 6px;
    pointer-events: all;
  }
  .changelog-wrap::-webkit-scrollbar { width: 4px; }
  .changelog-wrap::-webkit-scrollbar-thumb { background: #0cf5; border-radius: 2px; }

  .cl-version {
    color: #0cf;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    margin: 14px 0 4px;
    text-shadow: 0 0 8px #0cf;
    border-bottom: 1px solid #0cf3;
    padding-bottom: 4px;
  }
  .cl-version:first-child { margin-top: 0; }
  .cl-item {
    color: #aef;
    font-size: 12px;
    letter-spacing: 0.5px;
    line-height: 1.9;
    padding-left: 12px;
  }
  .cl-item::before { content: '• '; color: #0cf9; }

  /* ── BACKGROUND GRID ──────────────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    animation: gridDrift 20s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0; }
    to   { background-position: 60px 60px; }
  }

  /* ── SCANLINES ────────────────────────────────────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 9999;
    animation: crtFlicker 8s step-end infinite;
  }
  @keyframes crtFlicker {
    0%, 94%, 96%, 98%, 100% { opacity: 1; }
    95%, 97%, 99%           { opacity: 0.85; }
  }

  /* ── CANVAS ───────────────────────────────────────────────────────────────── */
  canvas {
    animation: canvasGlow 4s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }
  @keyframes canvasGlow {
    0%, 100% { box-shadow: 0 0 40px #0af3, 0 0 80px #0af1;  border-color: #1a3a5c; }
    50%      { box-shadow: 0 0 60px #0af6, 0 0 130px #0af2, 0 0 220px #0af1; border-color: #2a6090; }
  }

  /* ── HUD ──────────────────────────────────────────────────────────────────── */
  #ui {
    position: relative;
    z-index: 2;
    padding-bottom: 8px;
  }
  #ui::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #0cf, transparent);
    animation: scanBar 4s linear infinite;
  }
  @keyframes scanBar {
    0%   { transform: scaleX(0); transform-origin: left; opacity: 1; }
    49%  { transform: scaleX(1); transform-origin: left; opacity: 1; }
    50%  { transform: scaleX(1); transform-origin: right; opacity: 1; }
    100% { transform: scaleX(0); transform-origin: right; opacity: 1; }
  }

  .heart-p1 {
    display: inline-block;
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1);    text-shadow: 0 0 6px #0cf; }
    14%      { transform: scale(1.35); text-shadow: 0 0 14px #0ff; }
    28%      { transform: scale(1);    }
    42%      { transform: scale(1.18); }
    56%      { transform: scale(1);    }
  }

  #scoreDisplay {
    display: inline-block;
    animation: scorePulse 3s ease-in-out infinite;
  }
  @keyframes scorePulse {
    0%, 100% { color: #fff; text-shadow: none; }
    50%      { color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #0cf5; }
  }

  #recordDisplay { animation: recordGlow 2.5s ease-in-out infinite; }
  @keyframes recordGlow {
    0%, 100% { text-shadow: 0 0 6px #aa0; }
    50%      { text-shadow: 0 0 14px #ff0, 0 0 28px #aa06; }
  }

  /* ── PAUSE BUTTON ─────────────────────────────────────────────────────────── */
  #pauseBtn { animation: pauseGlow 3s ease-in-out infinite; }
  @keyframes pauseGlow {
    0%, 100% { box-shadow: none; }
    50%      { box-shadow: 0 0 10px #0cf4; }
  }

  /* ── OVERLAY ──────────────────────────────────────────────────────────────── */
  #overlay { z-index: 10; }

  #overlay h1 { animation: titleGlitch 5s infinite; }
  @keyframes titleGlitch {
    0%, 88%, 100% { text-shadow: 0 0 20px #0cf, 0 0 40px #0af; transform: translate(0); }
    89%  { text-shadow: -3px 0 #f0f, 3px 0 #0ff; transform: translate(-3px, 0); }
    90%  { text-shadow: 3px 0 #f0f, -3px 0 #0ff; transform: translate(3px, 0); }
    91%  { text-shadow: 0 0 20px #0cf, 0 0 40px #0af; transform: translate(0); }
    92%  { text-shadow: -2px 0 #f0f, 2px 0 #0ff; transform: translate(-2px, 1px); }
    93%  { text-shadow: 0 0 20px #0cf, 0 0 40px #0af; transform: translate(0); }
  }

  #overlay button {
    position: relative;
    overflow: hidden;
    transition: all 0.2s, transform 0.15s;
    animation: btnIdlePulse 2.5s ease-in-out infinite;
  }
  @keyframes btnIdlePulse {
    0%, 100% { box-shadow: 0 0 10px #0cf5; }
    50%      { box-shadow: 0 0 20px #0cf8, 0 0 40px #0cf2; }
  }
  #overlay button.btn-warn { animation: btnWarnPulse 2.5s ease-in-out infinite; }
  @keyframes btnWarnPulse {
    0%, 100% { box-shadow: 0 0 10px #fa05; }
    50%      { box-shadow: 0 0 20px #fa08, 0 0 40px #fa02; }
  }
  #overlay button.btn-green { animation: btnGreenPulse 2.5s ease-in-out infinite; }
  @keyframes btnGreenPulse {
    0%, 100% { box-shadow: 0 0 10px #4f45; }
    50%      { box-shadow: 0 0 20px #4f48, 0 0 40px #4f42; }
  }

  /* Shimmer sweep on buttons */
  #overlay button::before {
    content: '';
    position: absolute;
    top: -50%; left: -80%;
    width: 40%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
    animation: shimmer 3.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -80%; }
    60%, 100% { left: 160%; }
  }

  #overlay button:hover { transform: scale(1.04) translateY(-1px); }
  #overlay button:active { transform: scale(0.97); }

  /* ── NEW RECORD ROW ───────────────────────────────────────────────────────── */
  .records-table tr.new-record td {
    animation: newRecordPulse 1s ease-in-out infinite;
  }
  @keyframes newRecordPulse {
    0%, 100% { text-shadow: 0 0 8px #ff0; }
    50%      { text-shadow: 0 0 18px #ff0, 0 0 36px #aa06; }
  }

  /* ── SCORE DISPLAY (game over) ────────────────────────────────────────────── */
  #overlay .score-display {
    animation: scoreFlare 2s ease-in-out infinite;
  }
  @keyframes scoreFlare {
    0%, 100% { text-shadow: 0 0 10px #f44; }
    50%      { text-shadow: 0 0 24px #f44, 0 0 48px #f442; }
  }
</style>
</head>
<body>

<div id="ui">
  <div class="p1-ui">WASD: <span id="livesP1Display"></span></div>
  <div class="center-ui">СЧЁТ: <span id="scoreDisplay">0</span> &nbsp;|&nbsp; УР: <span id="levelDisplay">1</span> &nbsp;|&nbsp; РЕКОРД: <span id="recordDisplay">—</span></div>
  <button id="pauseBtn">⏸</button>
</div>

<canvas id="c"></canvas>
<div id="overlay"></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay   = document.getElementById('overlay');
const scoreEl   = document.getElementById('scoreDisplay');
const levelEl   = document.getElementById('levelDisplay');
const livesP1El  = document.getElementById('livesP1Display');
const recordEl   = document.getElementById('recordDisplay');
const pauseBtn   = document.getElementById('pauseBtn');

// ── records (localStorage) ────────────────────────────────────────────────────

function loadRecords() {
  try { return JSON.parse(localStorage.getItem('spaceRecords') || '[]'); } catch { return []; }
}

function saveRecord(s, lv) {
  const recs = loadRecords();
  const d = new Date();
  const dateStr = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
  recs.push({ score: s, level: lv, date: dateStr });
  recs.sort((a, b) => b.score - a.score);
  recs.splice(5);
  localStorage.setItem('spaceRecords', JSON.stringify(recs));
  return recs;
}

function bestScore() {
  const recs = loadRecords();
  return recs.length ? recs[0].score : 0;
}

function recordsHTML(recs, highlightScore) {
  if (!recs.length) return '<p style="color:#556;font-size:13px">Рекордов ещё нет</p>';
  const rows = recs.map((r, i) => {
    const isNew = r.score === highlightScore && i === recs.findIndex(x => x.score === highlightScore);
    return `<tr class="${isNew ? 'new-record' : ''}">
      <td>#${i+1}</td>
      <td>${r.score}</td>
      <td>ур.${r.level}</td>
      <td>${r.date}</td>
    </tr>`;
  }).join('');
  return `<table class="records-table"><tbody>${rows}</tbody></table>`;
}

const W = 900, H = 700;
canvas.width = W; canvas.height = H;

// score threshold, hp, attack type, reward pts, movement speed, size (optional)
const BOSS_TIERS = [
  { scoreThreshold:  500, hp:  25, type: 'minispread', pts:  150, dx: 4.0, color: '#1a3a1a', glow: '#4f4', label: 'МИНИ-БОСС', bw: 80, bh: 55 },
  { scoreThreshold: 1000, hp:  60, type: 'spread',     pts:  300, dx: 4.0, color: '#7f00ff', glow: '#f0f', label: 'BOSS I'   },
  { scoreThreshold: 2500, hp: 140, type: 'spiral',     pts:  700, dx: 5.6, color: '#cc2200', glow: '#f84', label: 'BOSS II'  },
  { scoreThreshold: 5000, hp: 260, type: 'aimed',      pts: 1500, dx: 7.0, color: '#b8860b', glow: '#ff0', label: 'BOSS III' },
];

let state = 'menu';
let score, level;
let p1, companions, bullets, enemies, particles, stars;
let keys = {};
let bossActive = false, boss = null;
let nextBossIdx = 0;
let frame = 0, time = 0;
let floatingTexts = [], bossTurrets = [];
let statsEnemiesKilled = 0, statsBossesKilled = 0, statsHitsTaken = 0;
let screenShake = 0;
let enemySpawnInterval = 60, enemySpawnTimer = 0;
let greenFlash = 0;

// ── audio ─────────────────────────────────────────────────────────────────────

let audioCtx = null, masterGain = null, musicSeq = null;
let muted = localStorage.getItem('spaceMuted') === 'true';

function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function nt(freq, type, vol, dur, delay, freqEnd, dst) {
  if (muted) return;
  const c = ac(), t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(dst || c.destination);
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (freqEnd != null) o.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), t0 + dur);
  g.gain.setValueAtTime(0.001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + Math.min(0.015, dur * 0.15));
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.05);
}

function sndShoot()      { nt(880, 'sine', 0.016, 0.052, 0, 440); }

function sndBeamCharge() {
  nt(160, 'sawtooth', 0.035, 0.75, 0, 1000);
  [0, 0.13, 0.27, 0.42, 0.58].forEach((d, i) => nt(300 + i*120, 'sine', 0.02, 0.09, d));
}

function sndBeamFire() {
  nt(1000, 'square',   0.07, 0.05, 0,    120);
  nt(300,  'sawtooth', 0.04, 0.28, 0.03, 55);
  nt(160,  'sine',     0.06, 0.18, 0.02);
}

function sndEnemyDie() {
  nt(160, 'sawtooth', 0.07, 0.13, 0,  20);
  nt(320, 'square',   0.04, 0.07, 0,  55);
}

function sndGreenDie() {
  nt(200, 'sawtooth', 0.06, 0.16, 0,  18);
  nt(550, 'sine',     0.03, 0.11, 0, 100);
}

function sndPlayerDie() {
  nt( 220, 'sawtooth', 0.10, 0.18, 0,      30);
  nt( 180, 'sine',     0.12, 0.55, 0.05,   20);
  nt( 110, 'sawtooth', 0.08, 0.9,  0.1,    18);
  nt(1400, 'square',   0.05, 0.08, 0,    200);
}

function sndBossDie() {
  nt( 55, 'sine',     0.14, 1.0,  0,      8);
  nt( 90, 'sawtooth', 0.12, 0.7,  0,     12);
  nt(200, 'sawtooth', 0.10, 0.4,  0,     35);
  nt(500, 'square',   0.06, 0.25, 0.03,  80);
  nt(120, 'sine',     0.10, 0.6,  0.05,  18);
}

// ── music themes (step-sequencer) ─────────────────────────────────────────────
//   melody / bass: 16 frequencies (0 = rest)   stepDur: seconds per step
//   pad: long-decay sine for ambient feel       kick: sine sweep drum every 4 steps

const THEMES = {
  // Ambient space drift — slow A-minor arpeggios
  menu: {
    stepDur: 0.52, melodType: 'sine',     bassType: 'sine',     pad: true,  kick: false,
    melodVol: 0.032, bassVol: 0.018,
    melody: [880, 0, 0, 0, 659.26, 0, 0, 0, 523.25, 0, 0, 0, 440, 0, 659.26, 0],
    bass:   [110, 0, 0, 0, 130.81, 0, 0, 0,      98, 0, 0, 0, 110, 0,      0, 0],
  },
  // Mini-boss — fast staccato D-minor glitch
  minispread: {
    stepDur: 0.185, melodType: 'triangle', bassType: 'sawtooth', pad: false, kick: true,
    melodVol: 0.065, bassVol: 0.05,
    melody: [587.33,      0, 523.25,    440,      0, 349.23,    440, 523.25,
             587.33, 523.25,    440,      0, 349.23, 293.66,      0, 349.23],
    bass:   [146.83,      0, 146.83,      0, 174.61,      0, 130.81,      0,
             146.83,      0, 146.83,      0, 130.81,      0, 164.81,      0],
  },
  // Boss I — slow ominous F-minor dread
  spread: {
    stepDur: 0.27, melodType: 'triangle', bassType: 'sawtooth', pad: false, kick: true,
    melodVol: 0.068, bassVol: 0.055,
    melody: [349.23,      0,      0, 311.13, 261.63,      0, 207.65,      0,
             261.63,      0, 311.13,      0, 349.23, 311.13,      0, 261.63],
    bass:   [ 87.31,      0,  87.31,      0, 103.83,      0,  87.31,      0,
               87.31,      0,  87.31,      0, 116.54,      0, 103.83,      0],
  },
  // Boss II — aggressive fast E-minor storm
  spiral: {
    stepDur: 0.162, melodType: 'triangle', bassType: 'sawtooth', pad: false, kick: true,
    melodVol: 0.068, bassVol: 0.052,
    melody: [659.26, 587.33, 493.88, 659.26,      0, 493.88,    392, 493.88,
             659.26,      0, 587.33, 493.88,    392, 329.63,      0,    392],
    bass:   [164.81,      0, 164.81,      0,    196,      0, 123.47,      0,
             164.81,      0, 164.81,      0, 130.81,      0, 146.83,      0],
  },
  // Boss III — blazing D-minor apocalypse, square wave
  aimed: {
    stepDur: 0.143, melodType: 'square',   bassType: 'sawtooth', pad: false, kick: true,
    melodVol: 0.048, bassVol: 0.05,
    melody: [1174.66,      0,    880, 698.46, 587.33,      0, 698.46,    880,
             1174.66, 1046.50,      0,    880, 698.46, 587.33,      0,    440],
    bass:   [ 146.83,      0, 146.83,      0, 174.61,      0, 130.81,      0,
              146.83,      0, 123.47,      0, 130.81,      0, 164.81,      0],
  },
};

function startMusic(key) {
  const theme = THEMES[key];
  if (!theme) return;
  if (musicSeq && musicSeq.active && musicSeq.theme === theme) return;
  stopMusic();
  const c = ac();
  masterGain = c.createGain();
  masterGain.gain.setValueAtTime(0.001, c.currentTime);
  masterGain.gain.linearRampToValueAtTime(muted ? 0 : 1, c.currentTime + 0.7);
  masterGain.connect(c.destination);
  musicSeq = { active: true, step: 0, nextTime: c.currentTime, theme };
  scheduleSeq();
}

function setMute(on) {
  muted = on;
  localStorage.setItem('spaceMuted', String(on));
  if (masterGain) masterGain.gain.setValueAtTime(on ? 0 : 1, ac().currentTime);
  document.querySelectorAll('.muteBtn').forEach(b => {
    b.textContent = on ? '🔇 ВЫКЛ' : '🔊 ЗВУК';
  });
}

function stopMusic() {
  if (musicSeq) musicSeq.active = false;
  musicSeq = null;
  if (masterGain) {
    const mg = masterGain; masterGain = null;
    try {
      mg.gain.linearRampToValueAtTime(0.001, ac().currentTime + 0.4);
      setTimeout(() => { try { mg.disconnect(); } catch(e) {} }, 600);
    } catch(e) {}
  }
}

function scheduleSeq() {
  if (!musicSeq || !musicSeq.active) return;
  const c = ac(), { theme } = musicSeq;
  const { stepDur, melody, bass, melodType, bassType, melodVol, bassVol, kick, pad } = theme;
  if (musicSeq.nextTime < c.currentTime - 0.5 || musicSeq.nextTime > c.currentTime + 1.5)
    musicSeq.nextTime = c.currentTime;
  while (musicSeq.nextTime < c.currentTime + 0.45) {
    const s = musicSeq.step % 16, t = musicSeq.nextTime, mg = masterGain;
    if (!mg) break;
    const mf = melody[s];
    if (mf) {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(mg);
      o.type = melodType; o.frequency.setValueAtTime(mf, t);
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(melodVol, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + (pad ? stepDur * 2.2 : stepDur * 0.78));
      o.start(t); o.stop(t + (pad ? stepDur * 2.8 : stepDur));
    }
    if (s % 2 === 0) {
      const bf = bass[s];
      if (bf) {
        const o = c.createOscillator(), f = c.createBiquadFilter(), g = c.createGain();
        o.connect(f); f.connect(g); g.connect(mg);
        o.type = bassType; o.frequency.setValueAtTime(bf, t);
        f.type = 'lowpass'; f.frequency.setValueAtTime(560, t);
        g.gain.setValueAtTime(0.001, t);
        g.gain.linearRampToValueAtTime(bassVol, t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, t + stepDur * (pad ? 3 : 1.8));
        o.start(t); o.stop(t + stepDur * (pad ? 3.5 : 2.1));
      }
    }
    if (kick && s % 4 === 0) {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(mg);
      o.type = 'sine';
      o.frequency.setValueAtTime(120, t);
      o.frequency.exponentialRampToValueAtTime(28, t + 0.12);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.2);
    }
    musicSeq.step++;
    musicSeq.nextTime += stepDur;
  }
  setTimeout(() => scheduleSeq(), 120);
}

function makePlayer(x, color, glowColor) {
  return { x, y: H - 80, w: 36, h: 40, speed: 8.5, lives: 3,
           invincible: 0, hitFlash: 0, shootCooldown: 0, trail: [],
           tripleShot: false, color, glowColor, alive: true };

function addCompanion() {
  companions.push({
    x: p1.x, y: p1.y,
    w: 28, h: 32, hp: 2,
    invincible: 0, shootCooldown: Math.floor(Math.random() * 14), trail: [],

  });

// Returns target {x,y} for companion at index idx in the pyramid.
// Layer 2 has 2 slots, layer 3 has 3, etc. (layer = distance below player).
function companionTarget(idx) {
  let layer = 2, start = 0;
  while (start + layer <= idx) { start += layer; layer++; }
  const pos = idx - start;
  const yOff = (layer - 1) * 52;
  const xOff = -(layer - 1) * 25 + pos * 50;
  return { x: p1.x + xOff, y: p1.y + yOff };
}

function drawShip(x, y, w, h, color, glowColor, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = glowColor; ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  // Left wing
  ctx.beginPath();
  ctx.moveTo(x, y - h*.5);
  ctx.lineTo(x - w*.55, y + h*.45);
  ctx.lineTo(x - w*.65, y + h*.5);
  ctx.lineTo(x - w*.38, y + h*.28);
  ctx.lineTo(x - w*.2,  y + h*.1);
  ctx.closePath(); ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(x, y - h*.5);
  ctx.lineTo(x + w*.55, y + h*.45);
  ctx.lineTo(x + w*.65, y + h*.5);
  ctx.lineTo(x + w*.38, y + h*.28);
  ctx.lineTo(x + w*.2,  y + h*.1);
  ctx.closePath(); ctx.fill();
  // Fuselage
  ctx.beginPath();
  ctx.moveTo(x, y - h*.5);
  ctx.lineTo(x - w*.16, y + h*.05);
  ctx.lineTo(x - w*.18, y + h*.48);
  ctx.lineTo(x,         y + h*.36);
  ctx.lineTo(x + w*.18, y + h*.48);
  ctx.lineTo(x + w*.16, y + h*.05);
  ctx.closePath(); ctx.fill();
  // Wing stripes
  ctx.fillStyle = glowColor + '55'; ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(x - w*.08, y - h*.28); ctx.lineTo(x - w*.48, y + h*.42);
  ctx.lineTo(x - w*.34, y + h*.42); ctx.lineTo(x - w*.04, y - h*.2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w*.08, y - h*.28); ctx.lineTo(x + w*.48, y + h*.42);
  ctx.lineTo(x + w*.34, y + h*.42); ctx.lineTo(x + w*.04, y - h*.2);
  ctx.closePath(); ctx.fill();
  // Engine pods
  ctx.fillStyle = color; ctx.shadowColor = glowColor; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.ellipse(x - w*.52, y + h*.42, w*.11, h*.07,  0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + w*.52, y + h*.42, w*.11, h*.07, -0.3, 0, Math.PI*2); ctx.fill();
  // Cockpit
  ctx.fillStyle = glowColor; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x, y - h*.12, w*.13, h*.21, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.globalAlpha = alpha * .5; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(x - w*.04, y - h*.19, w*.05, h*.07, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  if      (e.etype === 0) _drawEnemyFighter(e);
  else if (e.etype === 1) _drawEnemyInterceptor(e);
  else if (e.etype === 2) _drawEnemyEmitter(e);
  else if (e.etype === 3) _drawEnemyGunship(e);
  ctx.restore();
}

function drawGreenBeam(e) {
  const charging = e.beamTimer < 45 && e.beamActive <= 0;
  const active = e.beamActive > 0;
  if (!charging && !active) return;

  const tSE = Math.max(0, Math.min(W - e.x, H - e.y));
  const tNW = Math.max(0, Math.min(e.x, e.y));
  const tNE = Math.max(0, Math.min(W - e.x, e.y));
  const tSW = Math.max(0, Math.min(e.x, H - e.y));
  const arms = [
    [e.x + tSE, e.y + tSE],
    [e.x - tNW, e.y - tNW],
    [e.x + tNE, e.y - tNE],
    [e.x - tSW, e.y + tSW],
  ];

  ctx.save();
  if (active) {
    const a = Math.min(1, e.beamActive / 5);
    ctx.globalAlpha = a;
    ctx.shadowColor = '#4f4'; ctx.shadowBlur = 28;
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 5;
    ctx.beginPath();
    for (const [ax, ay] of arms) { ctx.moveTo(e.x, e.y); ctx.lineTo(ax, ay); }
    ctx.stroke();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#cfc'; ctx.shadowBlur = 6;
    ctx.beginPath();
    for (const [ax, ay] of arms) { ctx.moveTo(e.x, e.y); ctx.lineTo(ax, ay); }
    ctx.stroke();
  } else {
    const charge = (45 - e.beamTimer) / 45;
    const pulse = 0.5 + 0.5 * Math.sin(time * 0.45);
    ctx.globalAlpha = Math.min(1, charge * 0.5 + pulse * 0.2);
    ctx.shadowColor = '#4f4'; ctx.shadowBlur = 8;
    ctx.strokeStyle = '#4f4'; ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    for (const [ax, ay] of arms) { ctx.moveTo(e.x, e.y); ctx.lineTo(ax, ay); }
    ctx.stroke();
    ctx.setLineDash([]);
    // Pre-fire white flash on enemy body
    if (e.beamTimer < 12) {
      const intensity = (12 - e.beamTimer) / 12;
      ctx.globalAlpha = intensity * (0.45 + 0.45 * Math.abs(Math.sin(time * 2.2)));
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 35;
      ctx.fillStyle = '#fff5';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.w * 0.85, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

function _drawBossCrab(b) {

  }); ctx.restore();
  ctx.shadowColor = glow; ctx.shadowBlur = 22; ctx.fillStyle = color;
  // Left claw
  ctx.beginPath();
  ctx.moveTo(x-w*.5,y-h*.28); ctx.lineTo(x-w*1.05,y-h*.48); ctx.lineTo(x-w*1.18,y-h*.12);
  ctx.lineTo(x-w*1.05,y+h*.06); ctx.lineTo(x-w*.5,y+h*.14); ctx.closePath(); ctx.fill();

  ctx.beginPath(); ctx.moveTo(x-w*1.05,y-h*.48); ctx.lineTo(x-w*1.18,y-h*.28); ctx.lineTo(x-w*1.02,y-h*.2); ctx.closePath(); ctx.fill();

  ctx.lineTo(x+w*1.05,y+h*.06); ctx.lineTo(x+w*.5,y+h*.14); ctx.closePath(); ctx.fill();
  ctx.fillStyle = glow+'aa';
  ctx.beginPath(); ctx.moveTo(x+w*1.05,y-h*.48); ctx.lineTo(x+w*1.18,y-h*.28); ctx.lineTo(x+w*1.02,y-h*.2); ctx.closePath(); ctx.fill();
  // Carapace
  ctx.fillStyle = color; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.ellipse(x,y,w*.52,h*.54,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a6a1a';
  ctx.beginPath(); ctx.ellipse(x,y+h*.08,w*.4,h*.38,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x,y-h*.06,w*.26,h*.24,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle = glow; ctx.shadowBlur = 24;
  ctx.beginPath(); ctx.ellipse(x,y-h*.14,w*.22,h*.24,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#001400'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(x,y-h*.12,w*.12,h*.14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = glow; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x,y-h*.12,w*.06,h*.07,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(x-w*.04,y-h*.15,w*.025,h*.03,0,0,Math.PI*2); ctx.fill();

function _drawBossAlien(b) {
  const {x, y, w, h, color, glow} = b;
  ctx.shadowColor = glow; ctx.shadowBlur = 26;
  // Tentacles
  ctx.strokeStyle = color; ctx.lineWidth = 4;

function _drawBossDemon(b) {
  const {x, y, w, h, color, glow} = b;
  ctx.shadowColor = glow; ctx.shadowBlur = 30; ctx.fillStyle = color;
  // Fiery wings
  ctx.beginPath();
  ctx.moveTo(x-w*.4,y-h*.08); ctx.lineTo(x-w*1.3,y-h*.55); ctx.lineTo(x-w*1.45,y+h*.12);
  ctx.lineTo(x-w*1.05,y+h*.4); ctx.lineTo(x-w*.4,y+h*.22); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+w*.4,y-h*.08); ctx.lineTo(x+w*1.3,y-h*.55); ctx.lineTo(x+w*1.45,y+h*.12);
  ctx.lineTo(x+w*1.05,y+h*.4); ctx.lineTo(x+w*.4,y+h*.22); ctx.closePath(); ctx.fill();
  // Wing inner glow
  ctx.fillStyle = glow+'33'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.moveTo(x-w*.5,y-h*.04); ctx.lineTo(x-w*1.2,y-h*.38); ctx.lineTo(x-w*1.28,y+h*.12); ctx.lineTo(x-w*.5,y+h*.18); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+w*.5,y-h*.04); ctx.lineTo(x+w*1.2,y-h*.38); ctx.lineTo(x+w*1.28,y+h*.12); ctx.lineTo(x+w*.5,y+h*.18); ctx.closePath(); ctx.fill();
  // Main skull face
  ctx.fillStyle = color; ctx.shadowBlur = 22;
  ctx.beginPath();
  ctx.moveTo(x-w*.5,y-h*.5); ctx.lineTo(x+w*.5,y-h*.5); ctx.lineTo(x+w*.5,y+h*.3);
  ctx.lineTo(x+w*.28,y+h*.5); ctx.lineTo(x-w*.28,y+h*.5); ctx.lineTo(x-w*.5,y+h*.3);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#550000';
  ctx.beginPath();
  ctx.moveTo(x-w*.38,y-h*.4); ctx.lineTo(x+w*.38,y-h*.4); ctx.lineTo(x+w*.38,y+h*.22);
  ctx.lineTo(x+w*.22,y+h*.42); ctx.lineTo(x-w*.22,y+h*.42); ctx.lineTo(x-w*.38,y+h*.22);
  ctx.closePath(); ctx.fill();
  // Horns
  ctx.fillStyle = color; ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.moveTo(x-w*.3,y-h*.46); ctx.lineTo(x-w*.46,y-h*.9); ctx.lineTo(x-w*.18,y-h*.48); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+w*.3,y-h*.46); ctx.lineTo(x+w*.46,y-h*.9); ctx.lineTo(x+w*.18,y-h*.48); ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle = glow; ctx.shadowBlur = 24;
  ctx.beginPath(); ctx.ellipse(x-w*.2,y-h*.12,w*.13,h*.14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*.2,y-h*.12,w*.13,h*.14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(x-w*.22,y-h*.14,w*.04,h*.05,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*.18,y-h*.14,w*.04,h*.05,0,0,Math.PI*2); ctx.fill();
  // Teeth
  ctx.fillStyle = glow+'cc'; ctx.shadowBlur = 8;
  [-2,-1,0,1,2].forEach(i => {
    ctx.beginPath();
    ctx.moveTo(x+i*w*.16-w*.07,y+h*.38); ctx.lineTo(x+i*w*.16,y+h*.52); ctx.lineTo(x+i*w*.16+w*.07,y+h*.38);
    ctx.closePath(); ctx.fill();
  });
}

function _drawBossDreadnought(b) {
  const {x, y, w, h, color, glow} = b;
  ctx.shadowColor = glow; ctx.shadowBlur = 28; ctx.fillStyle = color;
  // Shoulder armor
  ctx.beginPath();
  ctx.moveTo(x-w*.5,y-h*.28); ctx.lineTo(x-w*1.08,y-h*.48); ctx.lineTo(x-w*1.18,y+h*.1);
  ctx.lineTo(x-w*.78,y+h*.3); ctx.lineTo(x-w*.5,y+h*.18); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x+w*.5,y-h*.28); ctx.lineTo(x+w*1.08,y-h*.48); ctx.lineTo(x+w*1.18,y+h*.1);
  ctx.lineTo(x+w*.78,y+h*.3); ctx.lineTo(x+w*.5,y+h*.18); ctx.closePath(); ctx.fill();
  // Main hull
  ctx.beginPath();
  ctx.moveTo(x-w*.5,y-h*.6); ctx.lineTo(x+w*.5,y-h*.6); ctx.lineTo(x+w*.55,y+h*.6);
  ctx.lineTo(x-w*.55,y+h*.6); ctx.closePath(); ctx.fill();
  // Armor plating
  ctx.fillStyle = '#3a2800';
  ctx.beginPath();
  ctx.moveTo(x-w*.42,y-h*.52); ctx.lineTo(x+w*.42,y-h*.52); ctx.lineTo(x+w*.46,y+h*.52);
  ctx.lineTo(x-w*.46,y+h*.52); ctx.closePath(); ctx.fill();
  // Seam lines
  ctx.strokeStyle = color+'88'; ctx.lineWidth = 2; ctx.shadowBlur = 4;
  [-1,0,1,2].forEach(i => {
    ctx.beginPath(); ctx.moveTo(x-w*.46,y+i*h*.3); ctx.lineTo(x+w*.46,y+i*h*.3); ctx.stroke();
  });
  // Gun barrels (3)
  ctx.fillStyle = glow; ctx.shadowBlur = 16;
  ctx.beginPath(); ctx.rect(x-w*.34,y+h*.38,w*.14,h*.28); ctx.fill();
  ctx.beginPath(); ctx.rect(x-w*.07,y+h*.36,w*.14,h*.3); ctx.fill();
  ctx.beginPath(); ctx.rect(x+w*.2,y+h*.38,w*.14,h*.28); ctx.fill();
  // Barrel tips
  ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.ellipse(x-w*.27,y+h*.66,w*.08,h*.04,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x,y+h*.66,w*.08,h*.04,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*.27,y+h*.66,w*.08,h*.04,0,0,Math.PI*2); ctx.fill();
  // Shoulder cannons
  ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.rect(x-w*1.0,y-h*.12,w*.24,h*.12); ctx.fill();
  ctx.beginPath(); ctx.rect(x+w*.76,y-h*.12,w*.24,h*.12); ctx.fill();
  // Bridge
  ctx.fillStyle = '#88aaff'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.rect(x-w*.36,y-h*.5,w*.72,h*.14); ctx.fill();
  ctx.fillStyle = '#ccd8ff'; ctx.shadowBlur = 6;
  [-2,-1,0,1,2].forEach(i => {
    ctx.beginPath(); ctx.ellipse(x+i*w*.14,y-h*.43,w*.05,h*.04,0,0,Math.PI*2); ctx.fill();
  });
  // Central reactor
  ctx.fillStyle = glow; ctx.shadowBlur = 24;
  ctx.beginPath(); ctx.ellipse(x,y,w*.18,h*.16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(x-w*.03,y-h*.03,w*.06,h*.05,0,0,Math.PI*2); ctx.fill();
}

function drawBoss(b) {
  ctx.save();
  ctx.shadowColor = b.glow; ctx.shadowBlur = 30;
  if      (b.type === 'minispread') _drawBossCrab(b);
  else if (b.type === 'spread')     _drawBossAlien(b);
  else if (b.type === 'spiral')     _drawBossDemon(b);
  else if (b.type === 'aimed')      _drawBossDreadnought(b);
  const bw = b.type === 'minispread' ? 110 : (b.type === 'spread' ? 160 : 200);
  ctx.shadowBlur = 0; ctx.fillStyle = '#333';
  ctx.fillRect(b.x - bw/2, b.y - b.h/2 - 22, bw, 8);
  ctx.fillStyle = b.glow; ctx.shadowColor = b.glow; ctx.shadowBlur = 6;
  ctx.fillRect(b.x - bw/2, b.y - b.h/2 - 22, bw * (b.hp / b.maxHp), 8);
  ctx.fillStyle = b.glow; ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'center'; ctx.shadowBlur = 4;
  ctx.fillText(b.label, b.x, b.y - b.h/2 - 26);
  ctx.restore();
}

function drawShipObj(obj) {
  if (!obj || !obj.alive) return;
  for (let i = 0; i < obj.trail.length; i++) {
    const t = obj.trail[i];
    ctx.save(); ctx.globalAlpha = (i / obj.trail.length) * 0.35;
    ctx.fillStyle = obj.glowColor;
    ctx.beginPath(); ctx.arc(t.x, t.y + obj.h / 3, 4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  drawThruster(obj.x, obj.y, obj.h, obj.glowColor);
  let color = obj.color, glow = obj.glowColor, alpha = 1;
  if (obj.hitFlash > 0) {
    // 3 red flashes: 5 frames on / 5 frames off
    color = '#cc0000'; glow = '#ff4444';
    alpha = Math.floor(obj.hitFlash / 5) % 2 === 1 ? 0 : 1;
  } else if (obj.invincible > 0) {
    alpha = frame % 10 < 5 ? 0.3 : 1;
  }
  drawShip(obj.x, obj.y, obj.w, obj.h, color, glow, alpha);
}

// ── spawn helpers ─────────────────────────────────────────────────────────────

function spawnEnemy() {
  const types = [
    { w: 32, h: 28, hp: 1, speed: 3.0 + level*0.6, color: '#f44', glowColor: '#f00', pts: 10, wave: false, canShoot: false, etype: 0 },
    { w: 28, h: 24, hp: 1, speed: 5.0 + level*0.8, color: '#fa0', glowColor: '#f80', pts: 15, wave: true,  canShoot: false, etype: 1 },
    { w: 34, h: 28, hp: 2, speed: 2.2 + level*0.5, color: '#1a5a1a', glowColor: '#4f4', pts: 25, wave: false, canShoot: false, isGreen: true, beamTimer: 70 + Math.random()*50, beamActive: 0, beamChargeSounded: false, etype: 2 },
    { w: 40, h: 34, hp: 3, speed: 1.6 + level*0.4, color: '#08f', glowColor: '#06f', pts: 30, wave: false, canShoot: true, etype: 3 },
  ];
  const available = level < 2 ? 2 : level < 3 ? 3 : 4;
  const t = types[Math.floor(Math.random() * available)];
  enemies.push({ ...t, x: Math.random()*(W-80)+40, y: -30,
                 waveOffset: Math.random()*Math.PI*2, shootTimer: 60+Math.random()*60, alive: true });
}

function spawnBoss(tier) {
  bossActive = true;
  boss = { x: W/2, y: -160, w: tier.bw||120, h: tier.bh||80,
           hp: tier.hp, maxHp: tier.hp, dx: tier.dx,
           shootTimer: 45, shootAngle: 0, bullets: [], alive: true,
           type: tier.type, pts: tier.pts,
           color: tier.color, glow: tier.glow, label: tier.label,
           intro: true, introPhase: 1, introTimer: 0, startY: -160, introMidY: Math.round(H * 0.44) };
  enemies = [];
  bossTurrets = [];
  if (tier.type === 'spiral') {
    bossTurrets.push({ x: 140, y: 210, w: 40, h: 34, hp: 9, maxHp: 9, shootTimer: 80,  alive: true, pts: 30, color: '#08f', glowColor: '#06f', etype: 3 });
    bossTurrets.push({ x: W-140, y: 210, w: 40, h: 34, hp: 9, maxHp: 9, shootTimer: 115, alive: true, pts: 30, color: '#08f', glowColor: '#06f', etype: 3 });
  }
  startMusic(tier.type);
}

function bossShoot() {
  if (!boss) return;
  if (boss.type === 'minispread') {
    for (let i = -2; i <= 2; i++) {
      const a = Math.PI/2 + i*0.26;
      boss.bullets.push({ x: boss.x, y: boss.y+boss.h/2, vx: Math.cos(a)*5.0, vy: Math.sin(a)*5.0 });
    }
    boss.shootTimer = 90;
  } else if (boss.type === 'spread') {
    for (let i = -3; i <= 3; i++) {
      const a = Math.PI/2 + i*0.22;
      boss.bullets.push({ x: boss.x, y: boss.y+boss.h/2, vx: Math.cos(a)*7.0, vy: Math.sin(a)*7.0 });
    }
    boss.shootTimer = 30;
  } else if (boss.type === 'spiral') {
    for (let i = 0; i < 5; i++) {
      const a = boss.shootAngle + (i/5)*Math.PI*2;
      boss.bullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a)*7.0, vy: Math.sin(a)*7.0 });
    }
    boss.shootAngle += 0.3; boss.shootTimer = 28;
  } else if (boss.type === 'aimed') {
    if (p1 && p1.lives > 0) {
      const a = Math.atan2(p1.y - boss.y, p1.x - boss.x);
      for (let i = -2; i <= 2; i++)
        boss.bullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a+i*0.18)*7.5, vy: Math.sin(a+i*0.18)*7.5 });
    }
    for (let i = 0; i < 5; i++) {
      const a = boss.shootAngle + (i/5)*Math.PI*2;
      boss.bullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a)*3.3, vy: Math.sin(a)*3.3 });
    }
    boss.shootAngle += 0.45; boss.shootTimer = 36;
  }
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*3+1;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                     life: 1, decay: Math.random()*0.03+0.02,
                     r: Math.random()*4+2, color });
  }
}

// ── collision ─────────────────────────────────────────────────────────────────

function rect(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 &&
         ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

function hitByDiagBeam(ex, ey, px, py, halfW) {
  // distance from (px,py) to diagonal line x-y=ex-ey
  const d1 = Math.abs((px - py) - (ex - ey)) * 0.7071;
  // distance from (px,py) to diagonal line x+y=ex+ey
  const d2 = Math.abs((px + py) - (ex + ey)) * 0.7071;
  return d1 < halfW || d2 < halfW;
}

// ── update ────────────────────────────────────────────────────────────────────

function updatePlayer(dt) {
  if (!p1 || p1.lives <= 0) return;
  if (keys['KeyA'] && p1.x > p1.w/2+5)     p1.x -= p1.speed * dt;
  if (keys['KeyD'] && p1.x < W-p1.w/2-5)   p1.x += p1.speed * dt;
  if (keys['KeyW'] && p1.y > p1.h/2+5)      p1.y -= p1.speed * dt;
  if (keys['KeyS'] && p1.y < H-p1.h/2-5)   p1.y += p1.speed * dt;

  p1.trail.push({ x: p1.x, y: p1.y });
  if (p1.trail.length > 8) p1.trail.shift();

  p1.shootCooldown -= dt;
  if (p1.shootCooldown <= 0) {
    bullets.push({ x: p1.x, y: p1.y-p1.h/2, vy: -26, fromPlayer: true, color: p1.glowColor });
    if (p1.tripleShot || level >= 4) {
      bullets.push({ x: p1.x-14, y: p1.y, vy: -26, fromPlayer: true, color: p1.glowColor });
      bullets.push({ x: p1.x+14, y: p1.y, vy: -26, fromPlayer: true, color: p1.glowColor });
    }
    sndShoot();
    p1.shootCooldown = level >= 5 ? 10 : 15;
  }
  if (p1.invincible > 0) p1.invincible -= dt;
  if (p1.hitFlash  > 0) p1.hitFlash  -= dt;
}

function updateCompanions(dt) {
  companions.forEach((c, idx) => {
    if (!c.alive) return;
    const tgt = companionTarget(idx);
    const lf = 1 - Math.pow(1 - 0.18, dt);
    c.x += (tgt.x - c.x) * lf;
    c.y += (tgt.y - c.y) * lf;
    c.x = Math.max(c.w/2, Math.min(W-c.w/2, c.x));
    c.y = Math.max(c.h/2, Math.min(H-c.h/2, c.y));

    c.trail.push({ x: c.x, y: c.y });
    if (c.trail.length > 8) c.trail.shift();

    c.shootCooldown -= dt;
    if (c.shootCooldown <= 0) {
      bullets.push({ x: c.x, y: c.y-c.h/2, vy: -26, fromPlayer: true, color: c.glowColor });
      c.shootCooldown = 14;
    }
    if (c.invincible > 0) c.invincible -= dt;
  });
  companions = companions.filter(c => c.alive);
}

function hitPlayer() {
  if (!p1 || p1.invincible > 0) return;
  p1.lives--;
  statsHitsTaken++;
  screenShake = 10;
  p1.invincible = 120;
  p1.hitFlash = 30;
  spawnParticles(p1.x, p1.y, p1.glowColor, 20);
  updateUI();
  if (p1.lives <= 0) { state = 'dead'; stopMusic(); sndPlayerDie(); showOverlay('dead'); }
}

function hitCompanion(c) {
  if (!c || !c.alive || c.invincible > 0) return;
  c.hp--;
  c.invincible = 60;
  spawnParticles(c.x, c.y, c.glowColor, 8);
  if (c.hp <= 0) { spawnParticles(c.x, c.y, c.glowColor, 14); c.alive = false; }
}

function update(dt) {
  frame++;
  time += dt;
  for (const s of stars) { s.y += s.speed * dt; if (s.y > H) { s.y = 0; s.x = Math.random()*W; } }
  floatingTexts.forEach(ft => { ft.y -= 1.2 * dt; ft.life -= 0.022 * dt; });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
  if (screenShake > 0) screenShake = Math.max(0, screenShake - 0.6 * dt);
  if (greenFlash > 0) greenFlash = Math.max(0, greenFlash - 0.028 * dt);

  if (state !== 'playing') return;

  updatePlayer(dt);
  updateCompanions(dt);

  // Boss spawn check
  if (!bossActive && nextBossIdx < BOSS_TIERS.length && score >= BOSS_TIERS[nextBossIdx].scoreThreshold) {
    spawnBoss(BOSS_TIERS[nextBossIdx]);
    nextBossIdx++;
  }

  if (!bossActive) {
    enemySpawnTimer += dt;
    if (enemySpawnTimer >= enemySpawnInterval) { spawnEnemy(); enemySpawnTimer = 0; }
  }

  // Move all bullets (store prev pos for swept collision)
  bullets = bullets.filter(b => {
    b._py = b.y; b._px = b.x;
    b.y += b.vy * dt; if (b.vx) b.x += b.vx * dt;
    return b.y > -20 && b.y < H+20 && b.x > -20 && b.x < W+20;
  });

  // Move enemies + collide with player/companion
  for (const e of enemies) {
    e.y += e.speed * dt;
    if (e.wave) e.x += Math.sin(time*0.1 + e.waveOffset) * 5.0 * dt;
    e.x = Math.max(e.w/2, Math.min(W-e.w/2, e.x));

    if (e.canShoot && level >= 3) {
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        if (p1 && p1.lives > 0) {
          const a = Math.atan2(p1.y-e.y, p1.x-e.x);
          bullets.push({ x: e.x, y: e.y, vx: Math.cos(a)*6, vy: Math.sin(a)*6, fromPlayer: false });
        }
        e.shootTimer = 60 + Math.random()*60;
      }
    }

    if (e.isGreen) {
      if (e.beamActive > 0) {
        e.beamActive -= dt;
        if (p1.lives > 0 && hitByDiagBeam(e.x, e.y, p1.x, p1.y, 20)) hitPlayer();
        for (const c of companions) {
          if (c.alive && hitByDiagBeam(e.x, e.y, c.x, c.y, 14)) hitCompanion(c);
        }
      } else {
        e.beamTimer -= dt;
        if (!e.beamChargeSounded && e.beamTimer < 45) {
          sndBeamCharge();
          e.beamChargeSounded = true;
        }
        if (e.beamTimer <= 0) {
          e.beamActive = 28;
          e.beamTimer = 85 + Math.random() * 55;
          e.beamChargeSounded = false;
          greenFlash = 0.42;
          sndBeamFire();
        }
      }
    }

    if (p1.lives > 0 && p1.invincible <= 0 && rect(p1.x, p1.y, p1.w-8, p1.h-8, e.x, e.y, e.w, e.h)) {
      hitPlayer(); e.alive = false;
    }
    for (const c of companions) {
      if (c.alive && c.invincible <= 0 && rect(c.x, c.y, c.w-6, c.h-6, e.x, e.y, e.w, e.h)) {
        hitCompanion(c); e.alive = false; break;
      }
    }

    if (e.y > H+30) e.alive = false;
  }
  enemies = enemies.filter(e => e.alive);

  // Boss update
  if (bossActive && boss && boss.alive) {
    if (boss.intro) {
      boss.introTimer += dt;
      if (boss.introPhase === 1) {
        const tt = Math.min(1, boss.introTimer / 65);
        const ease = tt < 0.5 ? 4*tt*tt*tt : 1 - Math.pow(-2*tt+2, 3)/2;
        boss.y = boss.startY + (boss.introMidY - boss.startY) * ease;
        if (tt >= 1) { boss.introPhase = 2; boss.introTimer = 0; }
      } else {
        const tt = Math.min(1, boss.introTimer / 50);
        boss.y = boss.introMidY + (120 - boss.introMidY) * (1 - (1-tt)*(1-tt));
        if (tt >= 1) { boss.intro = false; boss.y = 120; screenShake = 8; }
      }
    } else {
      boss.x += boss.dx * dt;
      if (boss.x > W-boss.w/2-20) { boss.x = W-boss.w/2-20; boss.dx = -Math.abs(boss.dx); }
      else if (boss.x < boss.w/2+20) { boss.x = boss.w/2+20; boss.dx = Math.abs(boss.dx); }
      boss.shootTimer -= dt;
      if (boss.shootTimer <= 0) bossShoot();
    }

    // Boss bullets hit player/companion
    boss.bullets = boss.bullets.filter(b => {
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (p1.lives > 0 && p1.invincible <= 0 && rect(p1.x, p1.y, p1.w-8, p1.h-8, b.x, b.y, 8, 8)) { hitPlayer(); return false; }
      for (const c of companions) {
        if (c.alive && c.invincible <= 0 && rect(c.x, c.y, c.w-6, c.h-6, b.x, b.y, 8, 8)) { hitCompanion(c); return false; }
      }
      return b.y < H+20 && b.y > -20 && b.x > -10 && b.x < W+10;
    });

    // Player/companion bullets hit boss
    bullets = bullets.filter(b => {
      if (!b.fromPlayer) return true;
      const scy = (b.y + b._py) / 2, sch = Math.abs(b.y - b._py) + 16;
      if (boss && boss.alive && !boss.intro && rect(b.x, scy, 4, sch, boss.x, boss.y, boss.w, boss.h)) {
        boss.hp--;
        spawnParticles(b.x, b.y, boss.glow, 4);
        if (boss.hp <= 0) {
          spawnParticles(boss.x, boss.y, boss.glow, 60);
          const pts = boss.pts;
          floatingTexts.push({ x: boss.x, y: boss.y - 20, pts, color: boss.glow, life: 1.5 });
          statsBossesKilled++;
          bossTurrets = [];
          boss.alive = false; bossActive = false; boss = null;
          sndBossDie();
          stopMusic();
          score += pts;
          updateUI();
          showOverlay('powerup');
        }
        return false;
      }
      for (const t of bossTurrets) {
        if (t.alive && rect(b.x, scy, 4, sch, t.x, t.y, t.w, t.h)) {
          t.hp--;
          spawnParticles(b.x, b.y, t.glowColor, 4);
          if (t.hp <= 0) {
            t.alive = false;
            spawnParticles(t.x, t.y, t.glowColor, 16);
            score += t.pts;
            floatingTexts.push({ x: t.x, y: t.y - 10, pts: t.pts, color: t.glowColor, life: 1 });
            statsEnemiesKilled++;
            sndEnemyDie();
            updateUI();
          }
          return false;
        }
      }
      return true;
    });

    // Boss body collision
    if (bossActive && boss && boss.alive && !boss.intro) {
      if (p1.lives > 0 && p1.invincible <= 0 && rect(p1.x, p1.y, p1.w-8, p1.h-8, boss.x, boss.y, boss.w, boss.h)) hitPlayer();
      for (const c of companions) {
        if (c.alive && c.invincible <= 0 && rect(c.x, c.y, c.w-6, c.h-6, boss.x, boss.y, boss.w, boss.h)) hitCompanion(c);
      }
    }

    // Turrets update
    for (const t of bossTurrets) {
      if (!t.alive) continue;
      t.shootTimer -= dt;
      if (t.shootTimer <= 0 && p1 && p1.lives > 0) {
        const a = Math.atan2(p1.y - t.y, p1.x - t.x);
        bullets.push({ x: t.x, y: t.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6, fromPlayer: false });
        t.shootTimer = 60 + Math.random() * 60;
      }
      if (p1.lives > 0 && p1.invincible <= 0 && rect(p1.x, p1.y, p1.w-8, p1.h-8, t.x, t.y, t.w, t.h)) hitPlayer();
      for (const c of companions) {
        if (c.alive && c.invincible <= 0 && rect(c.x, c.y, c.w-6, c.h-6, t.x, t.y, t.w, t.h)) hitCompanion(c);
      }
    }
  }

  // Player/companion bullets hit enemies
  bullets = bullets.filter(b => {
    if (!b.fromPlayer) return true;
    const scy = (b.y + b._py) / 2, sch = Math.abs(b.y - b._py) + 16;
    for (const e of enemies) {
      if (e.alive && rect(b.x, scy, 4, sch, e.x, e.y, e.w, e.h)) {
        e.hp--;
        spawnParticles(b.x, b.y, e.glowColor, 6);
        if (e.hp <= 0) { e.alive = false; spawnParticles(e.x, e.y, e.glowColor, 16); score += e.pts; floatingTexts.push({ x: e.x, y: e.y - 10, pts: e.pts, color: e.glowColor, life: 1 }); statsEnemiesKilled++; if (e.isGreen) sndGreenDie(); else sndEnemyDie(); updateUI(); }
        return false;
      }
    }
    return true;
  });

  // Enemy bullets hit player/companion
  bullets = bullets.filter(b => {
    if (b.fromPlayer) return true;
    if (p1.lives > 0 && p1.invincible <= 0 && rect(p1.x, p1.y, p1.w-8, p1.h-8, b.x, b.y, 8, 8)) { hitPlayer(); return false; }
    for (const c of companions) {
      if (c.alive && c.invincible <= 0 && rect(c.x, c.y, c.w-6, c.h-6, b.x, b.y, 8, 8)) { hitCompanion(c); return false; }
    }
    return true;
  });

  for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= Math.pow(0.95, dt); p.vy *= Math.pow(0.95, dt); p.life -= p.decay * dt; }
  particles = particles.filter(p => p.life > 0);
}

// ── draw ──────────────────────────────────────────────────────────────────────

function draw() {
  if (screenShake > 0) {
    const dx = (Math.random() - 0.5) * screenShake;
    const dy = (Math.random() - 0.5) * screenShake;
    canvas.style.transform = `translate(${dx}px, ${dy}px)`;
  } else {
    canvas.style.transform = '';
  }

  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    ctx.save(); ctx.globalAlpha = s.alpha; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if (state === 'menu') return;

  drawShipObj(p1);
  for (const c of companions) drawShipObj(c);

  for (const e of enemies) { if (e.isGreen) drawGreenBeam(e); drawEnemy(e); }

  // Turrets
  for (const t of bossTurrets) {
    if (!t.alive) continue;
    drawEnemy(t);
    const tbw = 32, tbx = t.x - tbw / 2, tby = t.y - t.h / 2 - 10;
    ctx.save();
    ctx.fillStyle = '#1a2a3a'; ctx.fillRect(tbx, tby, tbw, 4);
    ctx.shadowColor = t.glowColor; ctx.shadowBlur = 5; ctx.fillStyle = t.glowColor;
    ctx.fillRect(tbx, tby, tbw * (t.hp / t.maxHp), 4);
    ctx.restore();
  }

  if (bossActive && boss && boss.alive) {
    drawBoss(boss);
    ctx.save(); ctx.shadowColor = boss.glow; ctx.shadowBlur = 8; ctx.fillStyle = boss.glow;
    for (const b of boss.bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  }

  // Player bullets
  for (const b of bullets) {
    if (!b.fromPlayer) continue;
    ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = 12; ctx.fillStyle = b.color;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(b.x-2, b.y-8, 4, 16, 2);
    else ctx.rect(b.x-2, b.y-8, 4, 16);
    ctx.fill(); ctx.restore();
  }

  // Enemy bullets
  ctx.save(); ctx.shadowColor = '#f80'; ctx.shadowBlur = 10; ctx.fillStyle = '#f80';
  for (const b of bullets) { if (!b.fromPlayer) { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); } }
  ctx.restore();

  // Particles
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life; ctx.shadowColor = p.color; ctx.shadowBlur = 8; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Floating score texts
  for (const ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, ft.life);
    ctx.shadowColor = ft.color; ctx.shadowBlur = 8;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('+' + ft.pts, ft.x, ft.y);
    ctx.restore();
  }

  // Progress bar
  if (!bossActive && nextBossIdx < BOSS_TIERS.length && state === 'playing') {
    const nb = BOSS_TIERS[nextBossIdx];
    const prevScore = nextBossIdx > 0 ? BOSS_TIERS[nextBossIdx - 1].scoreThreshold : 0;
    const progress = Math.min(1, Math.max(0, (score - prevScore) / (nb.scoreThreshold - prevScore)));
    const pbw = 300, pbh = 5, pbx = (W - pbw) / 2, pby = H - 18;
    ctx.save();
    ctx.fillStyle = '#111d2a'; ctx.fillRect(pbx - 1, pby - 1, pbw + 2, pbh + 2);
    ctx.shadowColor = nb.glow; ctx.shadowBlur = 8; ctx.fillStyle = nb.glow;
    ctx.fillRect(pbx, pby, pbw * progress, pbh);
    ctx.shadowBlur = 0; ctx.fillStyle = '#7ab';
    ctx.font = '10px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(`▲ ${nb.label}  —  ещё ${Math.max(0, nb.scoreThreshold - score)} очков`, W / 2, pby - 5);
    ctx.restore();
  }

  // Boss warning
  if (bossActive && boss && boss.alive && frame % 60 < 30) {
    ctx.save(); ctx.fillStyle = boss.glow; ctx.globalAlpha = 0.9;
    ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center';
    ctx.shadowColor = boss.glow; ctx.shadowBlur = 12;
    ctx.fillText(`⚠ ${boss.label} ⚠`, W/2, 18);
    ctx.restore();
  }

  // Upcoming boss warning
  if (!bossActive && nextBossIdx < BOSS_TIERS.length) {
    const next = BOSS_TIERS[nextBossIdx];
    if (next.scoreThreshold - score <= 50 && frame % 40 < 20) {
      ctx.save(); ctx.fillStyle = next.glow; ctx.globalAlpha = 0.8;
      ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('⚠ БОСС ПРИБЛИЖАЕТСЯ ⚠', W/2, 18);
      ctx.restore();
    }
  }

  // Green beam flash
  if (greenFlash > 0) {
    ctx.save(); ctx.fillStyle = '#0f0'; ctx.globalAlpha = greenFlash * 0.17;
    ctx.fillRect(0, 0, W, H); ctx.restore();
  }

  // Dim overlay when paused or powerup selection
  if (state === 'paused' || state === 'powerup') {
    ctx.save(); ctx.fillStyle = '#000'; ctx.globalAlpha = 0.45;
    ctx.fillRect(0, 0, W, H); ctx.restore();
  }
}

  } else if (type === 'paused') {

    overlay.innerHTML = `
      <h1 style="font-size:40px">ПАУЗА</h1>
      <div class="btn-col">
        <button id="resumeBtn" class="btn-sm">▶ ПРОДОЛЖИТЬ</button>

      </div>`;
    document.getElementById('resumeBtn').addEventListener('click', resumeGame);
    document.getElementById('restartBtn').addEventListener('click', () => { overlay.style.display='none'; pauseBtn.textContent='⏸'; state='playing'; initGame(); });
    document.getElementById('menuBtn').addEventListener('click', () => { pauseBtn.textContent='⏸'; showOverlay('menu'); });

  } else if (type === 'powerup') {

    overlay.innerHTML = `
      <h1 style="font-size:28px;color:#4f4;text-shadow:0 0 20px #4f4;letter-spacing:4px">ВЫБЕРИ УСИЛЕНИЕ</h1>

        <button id="pu1">⚡ ТРОЙНОЙ ВЫСТРЕЛ</button>
        <button id="pu2" class="btn-warn">❤ ДОПОЛНИТЕЛЬНАЯ ЖИЗНЬ</button>
        <button id="pu3" class="btn-green">● НАПАРНИК</button>
      </div>`;
    document.getElementById('pu1').addEventListener('click', () => applyPowerup('triple'));
    document.getElementById('pu2').addEventListener('click', () => applyPowerup('life'));
    document.getElementById('pu3').addEventListener('click', () => applyPowerup('companion'));
  }
}

function applyPowerup(type) {
  if (type === 'triple')    { p1.tripleShot = true; }
  if (type === 'life')      { p1.lives = Math.min(p1.lives + 1, 5); }
  if (type === 'companion') { addCompanion(); }
  level++;
  enemySpawnInterval = Math.max(17, Math.round((70 - level * 7) / 1.5));
  updateUI();
  overlay.style.display = 'none';
  state = 'playing';
}

function startGame() {
  overlay.style.display = 'none';
  pauseBtn.textContent = '⏸';
  state = 'playing';
  try { ac(); } catch(e) {}
  initGame();
}

function resumeGame() {
  state = 'playing';
  overlay.style.display = 'none';
  pauseBtn.textContent = '⏸';
}

// ── pause button & keys ───────────────────────────────────────────────────────

pauseBtn.addEventListener('click', () => {
  if (state === 'playing') { showOverlay('paused'); pauseBtn.textContent = '▶'; }
  else if (state === 'paused') resumeGame();
});

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['KeyW','KeyA','KeyS','KeyD','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'Escape') {
    if (state === 'playing') { showOverlay('paused'); pauseBtn.textContent = '▶'; }
    else if (state === 'paused') resumeGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── main loop ─────────────────────────────────────────────────────────────────

let lastTime = 0;
function loop(ts) {
  const raw = lastTime ? (ts - lastTime) / (1000 / 60) : 1;
  const dt = Math.min(raw, 3);
  lastTime = ts;
  try { update(dt); draw(); } catch(err) { console.error('Game loop error:', err); }
  requestAnimationFrame(loop);
}

initStars();
showOverlay('menu');
recordEl.textContent = bestScore() || '—';
requestAnimationFrame(loop);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
